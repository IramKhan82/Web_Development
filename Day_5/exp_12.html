<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <style>
    body{
        background-image: url(hotelroom.jpg.jpeg);
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100%;
        /* width: 100%; */
        
    }
    div{
        padding: 10px 0px ;
    }
    h1{
        width: 100%;
        text-align: center;
        font-size: 40px;
    }
    form{
        margin-top: 80px;
        background-color: #fff;
        border: 1px solid #000;
        border-radius: 10px;
        padding: 0px 50px 20px 50px;
        width: 250px;
    }
    input:focus{
        background-color: pink;
    }
    input{
        border: none;
        border-bottom:1px solid #000;
        width: 100%;
        font-size: larger;
    }
    button{
        background-color: blue;
        font-size: large;
        color: white;
        font-weight: 550;
        width:100%;
        border: 1px solid #000;
        border-radius: 10px;
        height: 30px;
        display: flex;
        align-items: center;
        justify-content: center;
        padding:30px 0px;
    }
    button:hover{
        background-color: green;
        font-size: x-large;
        
    }
  </style>
  <body>
   <form action="">
        <h1>Registration</h1>
      <div>
        <input type="text" placeholder="Full Name" />
      </div>
      <div>
        <input type="email" placeholder="Email Id"/>
      </div>
      <div>
        <input type="number" placeholder="Phone Number"/>
      </div>
      <div>
        <input type="date" />
      </div>
      <div>
        <input type="number" placeholder="Aadhar Card" />
      </div>
      <div>
        <input type="file" style="border: none;">
      </div>
      <h3>
        *Please Add the aadhar card in pdf Format
      </h3>
      <button >
        Register
      </button>
   </form>

  </body>
</html>
