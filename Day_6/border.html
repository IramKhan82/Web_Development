<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Border page</title>
    <style>
        #id1{
            border-width: 3px;
            border-style: dashed;
            border-color: blue;
        }
        #id2{
            border: 4px groove burlywood;
        }
        #id3{
            border-bottom: 5px solid grey;
        }
        #id4{
            border-top: 2px solid rosybrown;
            border-bottom: 2px solid maroon;
            border-left: 9px solid blue;
            border-right: 9px solid blue;
        }
        #id5{
            border-left: 20px solid red;
        }
        #id6{
            border: 4px solid purple;
            border-radius: 7px;
        }
        #id7{
            border: 4px dotted pink;
            border-radius: 50px;
        }
    </style>
</head>
<body>
    <h1 id="id1">This is heading 1 Html Tag </h1>
    <h1 id="id2">This is heading 1 Html Tag </h1>
    <h1 id="id3">This is heading 1 Html Tag </h1>
    <h1 id="id4">This is heading 1 Html Tag </h1>
    <h1 id="id5">This is heading 1 Html Tag </h1>
    <h1 id="id6">This is heading 1 Html Tag </h1>
    <h1 id="id7">This is heading 1 Html Tag </h1>

</body>
</html>
