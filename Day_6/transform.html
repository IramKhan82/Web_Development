<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            height: 200px;
            width: 200px;
            border: 5px solid red;
            border-radius: 0px 100px 0px 100px;
            transition: transform 2s;
        }
        div:hover{
            transform: rotate(360deg);
        }
    </style>
</head>

<body>
    <div>
        <h1>Transform</h1>
        <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Earum, magni.</p>
    </div>
</body>

</html>
