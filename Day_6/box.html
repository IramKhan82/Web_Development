<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #div1{
            border: 3px groove whitesmoke;
            height: 100px;
            width: 100px;
            background-color: aquamarine;
            padding: 30px;
            margin: 30px;
            box-shadow: 20px 20px 2px mediumorchid;
            border-top-right-radius: 100px ;
            border-bottom-left-radius: 100px;
        }
        #div1:hover
        {
            border: 3px groove red;
            height: 100px;
            width: 100px;
            background-color: pink;
            padding: 30px;
            margin: 30px;
            box-shadow: 20px 20px 2px rgb(85, 49, 94);
            border-top-left-radius: 100px ;
            border-bottom-right-radius: 100px;
            border-top-right-radius: 00px ;
            border-bottom-left-radius: 00px;
        }
        #div2{
            border: 3px groove rgb(234, 30, 30);
            height: 100px;
            width: 100px;
            background-color: rgb(115, 155, 142);
            padding: 30px;
            margin: 30px;
            box-shadow: 20px 20px 2px rgb(61, 36, 104);
            border-top-right-radius: 50px ;
            border-bottom-left-radius: 50px;
            border-radius: 50px;
        
        }
        #div2:hover
        {
            border: 3px groove powderblue;
            height: 100px;
            width: 100px;
            background-color: pink;
            padding: 30px;
            margin: 30px;
            box-shadow: 20px 20px 2px rgb(85, 49, 94);
            border-top-left-radius: 0px ;
            border-bottom-right-radius: 0px;
            border-top-right-radius: 70px ;
            border-bottom-left-radius: 70px;
            
        }
        #div3{
            border: 3px groove blue;
            height: 100px;
            width: 100px;
            background-color: olive;
            padding: 30px;
            margin: 30px;
            box-shadow: 20px 20px 2px violet;
            border-top-right-radius: 10px ;
            border-bottom-left-radius: 10px;
            border-radius: 5px;
        }
        #div3:hover
        {
            border: 3px dashed powderblue;
            height: 100px;
            width: 100px;
            background-color: yellowgreen;
            padding: 30px;
            margin: 30px;
            box-shadow: 20px 20px 2px rgb(166, 19, 202);
            border-top-left-radius: 30px ;
            border-bottom-right-radius: 30px;
            border-top-right-radius: 0px ;
            border-bottom-left-radius: 00px;
        }
    </style>
</head>
<body>
    <div id="div1">
        HI
    </div>
<hr>
<div id="div2">
        KEHKASHA
    </div>
    <div id="div3">
        IRAM
    </div>
</body>
</html>
