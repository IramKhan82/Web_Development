<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
<style>
        #main{
            color: red;
            padding: 5px;
            margin: 5px;
            animation: colorchange 2s  infinite;
            text-shadow: 5px 5px 5px black;
            font-size: 100px ;
        }
        @keyframes colorchange{
            0%{
                color: aquamarine;
                text-shadow: 3px 3px 3px green;
                 font-size: 80px ;
            }
            25%{
                color: goldenrod;
                text-shadow: 3px 3px 3px blue;
                font-size: 60px ;
            }
            50%{
                color: burlywood;
                text-shadow: 3px 3px 3px green;
                font-size: 40px ;
            }
            75%{
                color: greenyellow;
                text-shadow: 3px 3px 3px pink;
                font-size: 20px ;
            }
            100%{
                color: plum;
                box-shadow:  3px 3px 3px purple;
                font-size: 10px ;
            }
        }
    </style>
</head>
<body>
    <br>
    <br>
    <br>
    <br>
    <br>
    <br>
    <br>
    <br>
    <br>
    <h1 align="center" id="main">IRAMKHAN</h1>
</body>
</html>
