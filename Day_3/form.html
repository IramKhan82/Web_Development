    <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form page</title>
</head>
<br>
  <fieldset method="get" action="script.html">
    <br>
        <legend align="center">Registration form </legend>
        <label> Enter your first name:</label>
        <input 
        type="text"
        name="fname"
        id="fname"
        size="40"
        placeholder="Enter your first name"
        required>
        <br><br>
        <label> Enter your Last name:</label>
        <input 
        type="text"
        name="lname"
        id="lname"
        size="40"
        placeholder="Enter your first name"
        required>
        <br><br>
        <label> Enter your password:</label>
        <input 
        type="password"
        name="password"
        id="pwd"
        size="40"
        placeholder="Enter the password"
        required>
        <br></fieldset>
    <label>Gender:</label>
        <input 
        type="radio"
        name="Gender" value="Female">Female
        <input 
        type="radio"
        name="Gender" value="male">male
        <br></br>
        <label for="semester">Semester:</label>
        <input type="radio" name="semester" value="sem1">sem1
        <input type="radio" name="semester" value="sem2">sem2
        <input type="radio" name="semester" value="sem3">sem3
        <input type="radio" name="semester" value="sem4">sem4
        <input type="radio" name="semester" value="sem5">sem5
        <input type="radio" name="semester" value="sem6">sem6
        <input type="radio" name="semester" value="sem7">sem7
        <input type="radio" name="semester" value="sem8">sem8
        <br></br>
    <br><br>

             <label for="Feedback">Give your feedback:</label>
             <br>
             <br>
             <textarea name="feedback" id="Feedback" rows="6" cols="80" placeholder="write here...."></textarea>
            
             <br><br>

             <label name="city" for="city" required>Select city:</label>
             <select id="city" >
                <option selected disabled    >Select an option</option>
                <option value="Harda">harda</option>
                <option value="bhopal">Bhopal</option>
                <option value="Indore">Indore</option>
             </select>

             <br><br>
             <label for="dob">Enter Birth Date:</label>
             <input type="date" id="dob" >

             <br><br>
             
             <label for="time">Enter Time:</label>
             <input type="time" id="time" >

             <br><br>

             <label for="pp">upload your profile picture:</label>
             <input type="file" id="pp" title="Select your profile picture" >
        <option value="UP"></option>
        <label>Skills:</label>
        <input type="checkbox" name="skills" value="python">python
        <input type="checkbox" name="skills" value="C++">C++
        <input type="checkbox" name="skills" value="C">C
        <input type="checkbox" name="skills" value="JAVA">JAVA
        <input type="checkbox" name="skills" value="Django">Django

    </select>
<br>
<br>
<input type="reset" value="Clear all data">
<input type="submit" value="Sign up">       




</fieldset>
</form>

</html>
