<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Practice Form</title>
</head>
<body style=" background-color: whitesmoke">

<h2 align="center">Practice Form</h2>

<form>
<table border="1" bordercolor="black" align="center">

<tr>
    <td colspan="2">
        <input type="radio" name="title"> Mr.
        <input type="radio" name="title"> Mrs.
        <input type="radio" name="title"> Ms.
    </td>

</tr>

<tr>
    <td>First Name :</td>
    <td><input type="text" placeholder="First name"></td>
</tr>

<tr>
    <td>Last Name :</td>
    <td><input type="text" placeholder="Last name"></td>
</tr>

<tr>
    <td>Date of Joining :</td>
    <td><input type="date"></td>
</tr>

<tr>
    <td>Mail Address 1 :</td>
    <td><input type="text"></td>
</tr>

<tr>
    <td>Mail Address 2 :</td>
    <td><input type="text"></td>
</tr>

<tr>
    <td>City :</td>
    <td><input type="text"></td>
</tr>

<tr>
    <td>State :</td>
    <td>
        <select>
            <option>--- Select State ---</option>
            <option>Madhya Pradesh</option>
            <option>Uttar Pradesh</option>
            <option>Maharashtra</option>
        </select>
    </td>
</tr>

<tr>
    <td>Zip :</td>
    <td><input type="text"></td>
</tr>

<tr>
    <td>Upload Photo :</td>
    <td><input type="file"></td>
</tr>

<tr>
    <td>E-mail :</td>
    <td><input type="email"></td>
</tr>

<tr>
    <td>Mobile :</td>
    <td><input type="text" value="+91"></td>
</tr>

<tr>
    <td>Languages Known :</td>
    <td>
        <input type="checkbox"> Hindi<br>
        <input type="checkbox"> Gujarati<br>
        <input type="checkbox"> English
    </td>
</tr>

<tr>
    <td>Additional Information :</td>
    <td><textarea rows="4" cols="30" placeholder="Optional"></textarea></td>
</tr>

<tr>
    <td align="center"><input type="submit" value="Submit"></td>
    <td align="center"><input type="reset" value="Reset"></td>
</tr>

</table>
</form>
</body>
</html>
