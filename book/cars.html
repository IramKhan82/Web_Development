<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pagani Cars</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background: linear-gradient(to bottom, black,black,rgb(0, 0, 0), rgb(0, 0, 0));
      color: #fff;
      
    }

    h1 {
      text-size-adjust:100px;
      text-align: center;
      margin-bottom: 30px;
      text-shadow: 2px 2px 4px #000;
      font-family: 'Times New Roman', Times, serif;
      text-shadow: 0px 0px 8px rgba(255, 255, 255, 0.6),
               0px 0px 15px rgba(0, 0, 0, 0.8);

    }

    .cars-container {
      display:list-item
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 400px;
      justify-items:center;
    }

    .car-card {
      position: relative;
      overflow: hidden;
      border-radius: 15px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.6);
      cursor: pointer;
      transition: transform 0.5s;
      max-width:800px;
    }

    .car-card img {
      width: 100%;
      display:block:
      border-radius: 15px;
    }

    .car-card:hover {
      transform: scale(1.05);
    }

    .car-info {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(0,0,0,0.7);
      color: #fff;
      padding: 15px;
      text-align: center;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .car-card:hover .car-info {
      opacity: 1;
    }

    .car-info h3 {
      margin: 0;
      font-size: 20px;
    }

    .car-info p {
      font-size: 14px;
      margin-top: 5px;
    }
  </style>
</head>
<body>
  <h1>Pagani Series</h1>
<center>
  <div class="cars-container">
    <!-- Zonda -->
    <div class="car-card" onclick="goToPage('zonda.html')">
      <img src="zonda.jpg" alt="Pagani Zonda">
      <div class="car-info">
        <h3>Pagani Zonda</h3>
        <p>First model, debuted in 1999. Legendary naturally aspirated AMG V12.</p>
      </div>
    </div>

    <!-- Huayra -->
    <div class="car-card" onclick="goToPage('huayra.html')">
      <img src="huayra.jpg" alt="Pagani Huayra">
      <div class="car-info">
        <h3>Pagani Huayra</h3>
        <p>Launched in 2011, featuring twin-turbo V12 and active aerodynamics.</p>
      </div>
    </div>

    <!-- Utopia -->
    <div class="car-card" onclick="goToPage('utopia.html')">
      <img src="utopia.jpg" alt="Pagani Utopia">
      <div class="car-info">
        <h3>Pagani Utopia</h3>
        <p>Introduced in 2022, blending analog driving feel with modern power.</p>
      </div>
    </div>
  </div></center>

  <script>
    function goToPage(page) {
      window.location.href = page;
    }
  </script>
</body>
</html>
