<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    Enter User Name <input type="text" id="uid" size="50">
    <br>
    <br>
    Enter Your Password <input type="password" id="pwd" size="50" onmouseover="myfunction1()" onmouseout="myfunction2()">
    <script>
        function myfunction1()
        {
            pwd.type="text"
        }
         function myfunction2()
        {
            pwd.type="password"
        }
    </script>

</body>
</html>
