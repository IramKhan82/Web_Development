<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
      Enter your name<input
        type="text"
        size="50"
        id="uid"
        placeholder="User Name"
      />
      <br/>
      <br/>
      Enter your password<input
        type="password"
        size="30"
        id="pwd"
        placeholder="Password"
      />
      <button onclick="my()">Show Password</button>
      <button onclick="my2()">Hide password</button>
    <script>
      function my() {
        pwd.type = "text";
      }
      function my2() {
        pwd.type = "password";
      }
    </script>
  </body>
</html>
