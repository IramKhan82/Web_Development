<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
     <script>
        var choice = prompt("Enter the name of Month:");
        switch(choice){
            case "january":
                document.write("<h1>January has 31 days</h1>")
                break;
            case "february":
                document.write("<h1>February has 28 days<h1>")
                break;
                case "march":
                document.write("<h1>March has 31 days</h1>")
                break;
            case "april":
                document.write("<h1>April has 30 days<h1>")
                break;
                case "may":
                document.write("<h1>May has 31 days</h1>")
                break;
            case "june":
                document.write("<h1>June has 30 days<h1>")
                break;
                case "july":
                document.write("<h1>July has 31 days</h1>")
                break;
            case "august":
                document.write("<h1>August has 31 days</h1>")
                break;
                case "september":
                document.write("<h1>September has 30 days</h1>")
                break;
            case "october":
                document.write("<h1>October has 31 days<h1>")
                break;
                case "november":
                document.write("<h1>January has 30 days</h1>")
                break;
            case "december":
                document.write("<h1>December has 31 days<h1>")
                break;
        }
    </script>
</body>
</html>
