<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        var a = prompt("Enter any character: ")
        if(a=="a" || a=="e" || a=="i" || a=="o" || a=="u")
    {
        document.write("<h1> Character is vowel</h1>")
    }
    
    else{
        document.write("<h1> Character is consonant</h1>")
    }
    </script>
</body>
</html>
