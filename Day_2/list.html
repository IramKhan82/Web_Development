<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>types of list</title>
</head>
<body>
    <h1> unordered list </h1>
    <ul type="none">
        <li>cse-aids</li>
        <li>cse</li>
        <li>cyber</li>
        <li>me</li>
        <li>ce</li>
        <li>ex</li>
    </ul>
    <h1>An Ordered List</h1>
    <ol type="a">
        <li>cse-aids</li>
        <li>cse</li>
        <li>cyber</li>
        <li>me</li>
        <li>ce</li>
        <li>ex</li>
    </ol>
    <h1>A descriptive list</h1>
    <dl>
        <dt>sistec</dt>
        <dd>Sagae institute of scienceand technology</dd>
        
    </dl>
</body>
</html>
