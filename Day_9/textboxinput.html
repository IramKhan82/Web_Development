<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <label>Enter the value of a</label>
    <br>
    <input type="text" id="num1" placeholder="Enter the value of a">
    <br>
     <label>Enter the value of b</label>
    <br>
    <input type="text" id="num2" placeholder="Enter the value of b">
    <br>
    <button onclick="sum()">SUM</button>
    <br>
    <br>
    <input type="text" id="result">
    <script>
        function sum()
        {
           a= parseInt(document.getElementById("num1").value);
           b= parseInt(document.getElementById("num2").value);
           var c;
           c=a+b;
           document.getElementById("result").value=c; 
        }
    </script>
</body>
</html>
